version: '3.7'
services:
  painel:
    image: ghcr.io/sdw-for-all/painel:latest
    container_name: painel
    expose:
      - "80"
    restart: always
    environment:
      - VIRTUAL_HOST=painel.sdwforall.com
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=painel.sdwforall.com
      - LETSENCRYPT_EMAIL=lucas@sdwforall.com
      - LETSENCRYPT_TEST=false
