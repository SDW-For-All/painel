<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="Painel de dados do projeto SDW For All — acesso a agua tratada e saneamento em comunidades rurais">
    <meta name="theme-color" content="#2A7B7D">

    <!-- Open Graph -->
    <meta property="og:title" content="Painel SDW For All">
    <meta property="og:description" content="Painel de dados do projeto SDW For All — acesso a agua tratada e saneamento em comunidades rurais">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://painel.sdwforall.com">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header__brand">
            <img src="assets/logo.png" alt="SDW For All" class="header__logo">

    <main class="dashboard">

            <div class="ripple">
                <div class="ripple__ring"></div>

                <div class="ripple__ring"></div>
            </div>
            <p class="dashboard__loader-text">Carregando painel</p>
        </div>

        <iframe
            id="dashboard-iframe"
            class="dashboard__iframe"
            src="https://lookerstudio.google.com/embed/reporting/b48d530d-115b-465b-ba9c-cbf9dd4d50bf/page/8m7qD"
            frameborder="0"
            style="border:0"
            allowfullscreen
            sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"
        ></iframe>
    </main>

    <script src="script.js"></script>
